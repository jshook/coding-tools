# Pushing a version tag (e.g. `v0.1.0`) builds the binaries and cuts a GitHub
# Release with downloadable, per-arch binary archives:
#   1. `build`          — compile every binary for each arch target, in parallel.
#   2. `github-release` — gather all per-arch archives into one GitHub Release.
#
# Publishing to crates.io is done by hand from the project (`cargo ws publish`),
# not from CI; the security audit is enforced by the `audit` job in ci.yml, which
# runs `cargo audit` on every push. `workflow_dispatch` runs just the build
# matrix on demand (no release), so the cross builds can be exercised without
# cutting a release.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Installs the cross linker (musl / aarch64) and points cargo at it.
      # A no-op for the native x86_64 Linux target.
      - name: Set up cross toolchain
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build all binaries
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          bins=(ct ct-search ct-view ct-tree ct-edit ct-patch ct-test)
          name="coding-tools-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$name"
          ext=""
          [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          for b in "${bins[@]}"; do
            cp "target/${{ matrix.target }}/release/${b}${ext}" "$name/"
          done
          cp README.md LICENSE "$name/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${name}.zip" "$name" >/dev/null
            echo "asset=${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${name}.tar.gz" "$name"
            echo "asset=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: coding-tools-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  github-release:
    name: github release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: (cd dist && sha256sum * | tee SHA256SUMS)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
